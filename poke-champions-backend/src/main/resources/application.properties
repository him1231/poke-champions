spring.application.name=poke-champions-backend
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.tryItOutEnabled=true

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/poke-champions-db
spring.datasource.username=postgres
spring.datasource.password=***REMOVED***
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.column_ordering_strategy=legacy

# Gemini (翻譯招式描述用)
gemini.api-key=${GEMINI_API_KEY:***REMOVED***}
gemini.model=gemini-2.0-flash
gemini.batch-size=20
gemini.delay-ms=1000
