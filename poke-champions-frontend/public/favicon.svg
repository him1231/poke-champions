<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-label="Poké Ball">
  <defs>
    <clipPath id="pb-top"><rect x="0" y="0" width="32" height="16" /></clipPath>
  </defs>
  <!-- 下半白 + 外框 -->
  <circle cx="16" cy="16" r="13" fill="#f4f4f5" stroke="#1a1a24" stroke-width="1.5" />
  <!-- 上半紅（與網站主題紅一致） -->
  <circle cx="16" cy="16" r="13" fill="#e6534f" clip-path="url(#pb-top)" />
  <!-- 赤道黑帶 -->
  <rect x="3" y="14.25" width="26" height="3.5" rx="0.5" fill="#1a1a24" />
  <!-- 中央按鈕 -->
  <circle cx="16" cy="16" r="5.25" fill="#f4f4f5" stroke="#1a1a24" stroke-width="1.2" />
  <circle cx="16" cy="16" r="2.1" fill="#1a1a24" />
</svg>
