<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-label="Poké Champions">
  <defs>
    <clipPath id="pb-top"><rect x="0" y="0" width="32" height="16" /></clipPath>
  </defs>
  <!-- 深色圓角背景 -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#1a1a24"/>
  <!-- 下半白 + 外框 -->
  <circle cx="16" cy="17" r="11.5" fill="#f4f4f5" stroke="#1a1a24" stroke-width="1.2"/>
  <!-- 上半紅 -->
  <circle cx="16" cy="17" r="11.5" fill="#e6534f" clip-path="url(#pb-top)"/>
  <!-- 赤道黑帶 -->
  <rect x="4.5" y="15.25" width="23" height="3.5" rx="0.5" fill="#1a1a24"/>
  <!-- 中央按鈕白圈 -->
  <circle cx="16" cy="17" r="4.5" fill="#f4f4f5" stroke="#1a1a24" stroke-width="1.1"/>
  <!-- 皇冠圖示（金色，置中） -->
  <g transform="translate(16,17)">
    <polygon points="-2.4,1.4 -2.4,-0.8 -1.4,0.2 0,-1.4 1.4,0.2 2.4,-0.8 2.4,1.4" fill="#f5c518"/>
    <rect x="-2.4" y="1.4" width="4.8" height="0.9" rx="0.3" fill="#f5c518"/>
  </g>
</svg>
